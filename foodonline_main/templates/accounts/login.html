{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h3>Sign In</h3>
        <p class="subtitle">Welcome back! Please enter your details.</p>

        <!-- Alerts -->
        <div style="margin-bottom: 20px;">
            {% include 'includes/alert.html' %}
        </div>

        <form action="{% url 'loginUser' %}" method="POST" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <a href="{% url 'forgotpassword' %}" class="forgot-link">Forgot password?</a>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="login-footer">
            Don't have an account? <a href="{% url 'registerUser' %}">Sign up for free</a>
            <div style="margin-top: 10px;">
                Are you a Vendor? <a href="{% url 'registerVendor' %}">Register Restaurant</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
