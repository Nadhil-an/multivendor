{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h3>Create New Password</h3>
        <p class="subtitle">Please enter your new password below.</p>

        <!-- Alerts -->
        <div style="margin-bottom: 20px;">
            {% include 'includes/alert.html' %}
        </div>

        <form action="{% url 'resetpassword' %}" method="POST" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Confirm Password</button>
        </form>

        <div class="login-footer">
            Already have an account? <a href="{% url 'loginUser' %}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
