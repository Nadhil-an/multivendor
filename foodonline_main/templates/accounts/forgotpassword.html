{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h3>Forgot Password?</h3>
        <p class="subtitle">Enter your email address below and we'll send you a link to reset your password.</p>

        <!-- Alerts -->
        <div style="margin-bottom: 20px;">
            {% include 'includes/alert.html' %}
        </div>

        <form action="{% url 'forgotpassword' %}" method="POST" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@gmail.com" required>
            </div>

            <button type="submit" class="login-btn">Send Reset Link</button>
        </form>

        <div class="login-footer" style="text-decoration: none;">
            Remember your password? <a href="{% url 'loginUser' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
