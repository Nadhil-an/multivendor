{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<div class="main-section" style="background: #ffffff; min-height: 80vh; display: flex; align-items: center; font-family: 'Inter', sans-serif;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="auth-card p-lg-5 p-4" style="background: #fff; border-radius: 32px; border: 1px solid #f8f8f8; box-shadow: 0 40px 100px rgba(0,0,0,0.03);">
                    
                    <div class="text-center mb-5">
                        <div class="mb-4">
                            <span class="p-3 rounded-circle" style="background: #fff5f5; display: inline-block;">
                                <i class="fas fa-key text-danger" style="font-size: 24px;"></i>
                            </span>
                        </div>
                        <h3 class="font-weight-bold" style="color: #1a1a1a; letter-spacing: -1px;">Security & Access</h3>
                        <p class="text-muted" style="font-size: 14px;">Enter your email to receive a password reset link.</p>
                    </div>

                    <!-- Alerts -->
                    {% include 'includes/alert.html' %}

                    <form action="{% url 'forgotpassword' %}" method="POST" class="mt-4">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label class="font-weight-bold small text-uppercase mb-2 d-block" style="letter-spacing: 1px; color: #444;">Email Address</label>
                            <input type="email" name="email" class="form-control-premium" placeholder="name@university.edu" required>
                        </div>

                        <button type="submit" class="btn btn-danger btn-block py-3 font-weight-bold text-uppercase" 
                                style="border-radius: 14px; background: #d32323; border: none; letter-spacing: 1.5px; font-size: 14px; box-shadow: 0 10px 25px rgba(211, 35, 35, 0.15);">
                            Send Reset Link <i class="fas fa-paper-plane ml-2" style="font-size: 12px;"></i>
                        </button>
                    </form>

                    <div class="text-center mt-5">
                        <p class="text-muted mb-0" style="font-size: 13px;">
                            Remember your password? <a href="{% url 'loginUser' %}" class="text-danger font-weight-bold" style="text-decoration: none;">Sign In</a>
                        </p>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="text-muted small" style="text-decoration: none; opacity: 0.6;">
                        <i class="fas fa-arrow-left mr-2"></i> Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control-premium {
        width: 100%;
        border-radius: 12px;
        padding: 14px 18px;
        border: 1px solid #f0f0f0;
        transition: all 0.3s ease;
        background: #fdfdfd;
        font-size: 15px;
        color: #111;
    }
    .form-control-premium:focus {
        border-color: #d32323;
        box-shadow: 0 0 0 4px rgba(211, 35, 35, 0.03);
        background: #fff;
        outline: none;
    }
    .btn-danger:hover {
        background: #b51d1d !important;
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(211, 35, 35, 0.2) !important;
    }
</style>

{% endblock %}
