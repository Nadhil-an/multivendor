{% load static %}

<!-- ================= Header Start ================= -->
<header id="header" class="main-header">
    <div class="container-fluid px-lg-5">
        <div class="row align-items-center py-2">

            <!-- Logo -->
            <div class="col-lg-3 col-md-4 col-6">
                <a href="{% url 'home' %}" class="logo">
                    <img src="{% static 'images/logo.png' %}" alt="Unibite Logo" height="45">
                </a>
            </div>

            <!-- Navigation -->
            <div class="col-lg-9 col-md-8 col-6 d-flex justify-content-end align-items-center">

                <div class="nav-right">

                    <!-- Food Stalls -->
                    <a href="{% url 'marketplace' %}" class="clean-nav-link">Food Stalls</a>

                    {% if user.is_authenticated %}

                        <!-- My Account -->
                        <a href="{% url 'customerDashboard' %}" class="clean-nav-link">My Account</a>

                        <!-- Cart -->
                        <a href="{% url 'cart' %}" class="clean-cart-icon">
                            <i class="fa fa-shopping-cart"></i>
                            <span class="clean-cart-badge" id="cart_counter">{{ cart_count }}</span>
                        </a>

                        <!-- Logout -->
                        <a href="{% url 'logout' %}" class="clean-nav-link logout-link">Logout</a>

                    {% else %}

                        <!-- Login / Register -->
                        <div class="auth-links">
                            <a href="{% url 'loginUser' %}" class="login-link">Login</a>
                            <span>/</span>
                            <a href="{% url 'registerUser' %}" class="register-link">Register</a>
                        </div>

                        <!-- Register Restaurant -->
                        <a href="{% url 'registerVendor' %}" class="clean-nav-btn-solid">
                            Register Restaurant
                        </a>

                    {% endif %}

                </div>

            </div>

        </div>
    </div>
</header>
<!-- ================= Header End ================= -->
