{% load static %}
<div class="profile-header-minimal py-4 mb-5" style="background: #ffffff; border-bottom: 1px solid #f1f5f9;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-auto">
                <div class="position-relative">
                    {% if user_profile.profile_picture %}
                        <img src="{{ user_profile.profile_picture.url }}" alt="profile_photo" 
                             style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                    {% else %}
                        <img src="{% static 'images/default.jpg' %}" alt="default_image" 
                             style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                    {% endif %}
                </div>
            </div>
            <div class="col pl-3">
                <h4 class="mb-0 font-weight-bold" style="color: #1a1a1a; letter-spacing: -0.5px; font-size: 20px;">
                    {{ user.first_name }} {{ user.last_name }} <span class="badge ml-2" style="background: #f1f5f9; color: #64748b; font-size: 9px; vertical-align: middle;">CUSTOMER</span>
                </h4>
                <p class="text-muted mb-0 small" style="letter-spacing: 0.2px;">{{ user.email }}</p>
            </div>
            <div class="col-auto">
                <a href="{% url 'cprofile' %}" class="btn btn-sm btn-light shadow-sm" style="border-radius: 10px; font-weight: 600; font-size: 12px; padding: 6px 15px;">Edit Profile</a>
            </div>
        </div>
    </div>
</div>
